<!DOCTYPE html>

<head>

    <style>
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
            .text-glow {
                text-shadow: 0 0 15px rgba(175, 21, 23, 0.2);
            }
            .romantic-bg {
                background: linear-gradient(135deg, #fff8ef 0%, #fec1d6 50%, #fff8ef 100%);
                background-size: 400% 400%;
            }
            
            .heart-big {
                font-size: 8rem;
                animation: beat 1s infinite alternate;
                filter: drop-shadow(0 0 20px #ff4d6d);
            }
            @keyframes beat {
                to { transform: scale(1.2); }
            }
            
            #heart-rain {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 1;
            }
        </style>
</head>
<body class="bg-surface font-body text-on-surface romantic-bg min-h-screen flex items-center justify-center p-6 text-center">
    
    <canvas id="heart-rain"></canvas>

    <div class="relative z-10 max-w-2xl">
        <div class="heart-big mb-8">❤️</div>
        <h1 class="font-headline text-5xl md:text-7xl italic text-primary leading-tight text-glow mb-6">
            I Love You Forever!
        </h1>
        <p class="font-body text-xl md:text-2xl text-secondary italic max-w-lg mx-auto leading-relaxed mb-12">
            Every moment with you is a blessing. Thank you for being mine. This is just the beginning of our forever... ✨
        </p>
        
        <a href="index.html" class="group relative px-12 py-5 bg-primary text-on-primary rounded-full font-label text-lg tracking-widest uppercase overflow-hidden transition-all hover:scale-110 hover:shadow-[0_0_30px_rgba(175,21,23,0.4)] active:scale-95 inline-block">
            <span class="relative z-10 flex items-center gap-2">
                Back to Start <span class="material-symbols-outlined text-sm" data-icon="home">home</span>
            </span>
            <div class="absolute inset-0 bg-primary-container translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
        </a>
    </div>

    <script>
        const canvas = document.getElementById('heart-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const fallingHearts = [];

        class FallingHeart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 20 + 10;
                this.speed = Math.random() * 3 + 2;
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 77, 109, ${this.opacity})`;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText('❤️', this.x, this.y);
            }
        }

        function createHearts() {
            for (let i = 0; i < 50; i++) {
                fallingHearts.push(new FallingHeart());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fallingHearts.forEach(heart => {
                heart.update();
                heart.draw();
            });
            requestAnimationFrame(animate);
        }

        createHearts();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
