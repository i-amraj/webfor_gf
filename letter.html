    <script>
        const message = `Jab se tumse mila hoon, meri duniya hi badal gayi hai. Maine kabhi nahi socha tha ke koi meri life mein itni importance rakhega. Tum meri darkest raaton ki roshni ho aur mere har dard ka sukoon ho. Har woh hansi jo humne saath baanti, aur har woh pal jo humne jiya, woh mere liye kisi sapne se kam nahi hai. \n\nMain bas tumhe batana chahta hoon ke tum mere liye kya ho. Tum sirf meri partner nahi, meri sabse achi dost aur mera sukoon ho. Is website ko click karte huye, main umeed karta hoon ke tum mere pyaar ka thoda sa ehsaas kar sako. \n\nChalo, hamari yaadon ki galiyon mein thoda aur ghoomte hain...`;
        
        let i = 0;
        const speed = 40;

        function typeWriter() {
            if (i < message.length) {
                const char = message.charAt(i);
                document.getElementById("letter-text").innerHTML += char === '\n' ? '<br>' : char;
                i++;
                setTimeout(typeWriter, speed);
            } else {
                document.getElementById("cursor").style.display = "none";
                const nextContainer = document.getElementById("next-container");
                nextContainer.classList.remove('opacity-0');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            syncMusic();
            typeWriter();
        });
    </script>
