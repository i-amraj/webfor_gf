<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 📸 | Our Story</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin-top: 4rem;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            aspect-ratio: 1/1;
            border: 2px solid var(--glass-border);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.03);
            border-color: var(--primary-pink);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }
        .gallery-item:hover img {
            filter: brightness(0.8);
        }
        .overlay-text {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            background: rgba(255, 117, 140, 0.8);
            color: #fff;
            padding: 10px;
            text-align: center;
            transition: bottom 0.3s ease;
            font-size: 0.9rem;
        }
        .gallery-item:hover .overlay-text {
            bottom: 0;
        }

        /* Lightbox Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
        .close-modal {
            position: absolute;
            top: 30px;
            right: 50px;
            color: #fff;
            font-size: 3rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="page-container">

        <h1 style="font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin-top: 2rem;">Beautiful Moments 📸</h1>

        <div class="gallery-grid">
            <div class="gallery-item" onclick="openModal('images/img1.png')">
                <img src="images/img1.png" alt="Memory 1">
                <div class="overlay-text">A beautiful sunset with you ❤️</div>
            </div>
            <div class="gallery-item" onclick="openModal('images/img2.png')">
                <img src="images/img2.png" alt="Memory 2">
                <div class="overlay-text">Holding onto forever ✨</div>
            </div>
            <div class="gallery-item" onclick="openModal('images/img3.png')">
                <img src="images/img3.png" alt="Memory 3">
                <div class="overlay-text">Our special dinner date 🕯️</div>
            </div>
            <div class="gallery-item" onclick="openModal('images/img4.png')">
                <img src="images/img4.png" alt="Memory 4">
                <div class="overlay-text">Walking life's path together 🍂</div>
            </div>
        </div>

        <div style="margin-top: 4rem;">
            <a href="timeline.html" class="btn-enter">View Our Journey 🕰️</a>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="imageModal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg" class="modal-content">
    </div>

    <script src="js/script.js"></script>
    <script>
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modal.style.display = "flex";
            modalImg.src = src;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        // Close modal on click outside
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
