<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for You 🎁 | Our Story</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .surprise-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 4rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: var(--shadow);
            margin-top: 5rem;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 5;
        }
        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #fff;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 2rem;
            position: relative;
            min-height: 100px;
        }
        #noBtn {
            position: absolute;
            transition: all 0.2s ease;
            background: #555;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }
        #yesBtn {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            z-index: 1000 !important; /* Extremely high to ensure click */
            position: relative;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1; 
        }
        
        /* Celebration Overlay */
        #celebrationOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            backdrop-filter: blur(10px);
        }
        .big-heart-beat {
            font-size: 10rem;
            animation: heartBeat 0.8s infinite alternate;
            filter: drop-shadow(0 0 30px #ff4d6d);
        }
        @keyframes heartBeat {
            to { transform: scale(1.3); }
        }
        .love-text {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            margin-top: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="page-container" style="position: relative;">
        <div class="surprise-card">
            <h2>One Last Question... ❤️</h2>
            <p style="font-size: 1.5rem; margin-bottom: 2rem;">Will you stay with me forever?</p>
            
            <div class="btn-group" id="btnGroup">
                <a class="btn-enter" id="yesBtn" onclick="handleYesClick(event)">YES! 😊</a>
                <button class="btn-enter" id="noBtn" onmouseover="moveButton()">NO 😅</button>
            </div>
        </div>
        
        <div id="celebrationOverlay">
            <div class="big-heart-beat">❤️</div>
            <div class="love-text">Our Journey Begins Forever... ✨</div>
        </div>

        <canvas id="confetti" class="confetti-canvas"></canvas>
    </div>

    <script src="js/script.js"></script>
    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const overlay = document.getElementById('celebrationOverlay');
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let particles = [];

        function moveButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 50;
            const maxY = window.innerHeight - noBtn.offsetHeight - 50;
            
            const randomX = Math.random() * (maxX - 50) + 25;
            const randomY = Math.random() * (maxY - 50) + 25;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function handleYesClick(event) {
            event.preventDefault();
            console.log("YES Clicked!");
            
            // Trigger the "WOW" effect
            overlay.style.display = 'flex';
            confettiCanvas.style.zIndex = "10000";
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            // Play music if available
            const music = window.parent.document.getElementById('bgMusic') || document.getElementById('bgMusic');
            if(music) music.play().catch(e => console.log(e));

            // Generate particles
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height,
                    size: Math.random() * 15 + 5,
                    color: `hsl(${Math.random() * 30 + 330}, 100%, 65%)`, // Pinks and Reds
                    speedY: Math.random() * 4 + 2,
                    speedX: Math.random() * 6 - 3,
                    rotation: Math.random() * 360,
                    isHeart: Math.random() > 0.5
                });
            }
            
            animateConfetti();
            
            // Redirect after celebration
            setTimeout(() => {
                window.location.href = "final.html";
            }, 3500);
        }

        function animateConfetti() {
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            particles.forEach((p, i) => {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += 2;
                
                confettiCtx.save();
                confettiCtx.translate(p.x, p.y);
                confettiCtx.rotate(p.rotation * Math.PI / 180);
                confettiCtx.fillStyle = p.color;
                
                if(p.isHeart) {
                     // Draw Heart
                    confettiCtx.beginPath();
                    const s = p.size;
                    confettiCtx.moveTo(0, s/4);
                    confettiCtx.bezierCurveTo(0, 0, -s/2, 0, -s/2, s/4);
                    confettiCtx.bezierCurveTo(-s/2, s/2, 0, s*3/4, 0, s);
                    confettiCtx.bezierCurveTo(0, s*3/4, s/2, s/2, s/2, s/4);
                    confettiCtx.bezierCurveTo(s/2, 0, 0, 0, 0, s/4);
                    confettiCtx.fill();
                } else {
                    confettiCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                }
                
                confettiCtx.restore();
                
                if (p.y > confettiCanvas.height) {
                    p.y = -20;
                    p.x = Math.random() * confettiCanvas.width;
                }
            });
            requestAnimationFrame(animateConfetti);
        }
    </script>
</body>
</html>
